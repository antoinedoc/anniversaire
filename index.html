<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pour Margaux 💕</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
        .title { font-family: 'Dancing Script', cursive; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-x-hidden overflow-y-auto bg-[radial-gradient(circle_at_top,_#fff1f2_0%,_#ffe4e6_35%,_#fbcfe8_100%)] px-4 py-8 sm:px-6 lg:px-8 text-rose-900">

    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute left-[-5%] top-[-10%] h-56 w-56 rounded-full bg-pink-200/40 blur-3xl"></div>
        <div class="absolute bottom-[-8%] right-[-5%] h-64 w-64 rounded-full bg-rose-300/40 blur-3xl"></div>
        <div class="absolute top-10 left-10 text-3xl sm:text-4xl opacity-40">💕</div>
        <div class="absolute top-20 right-16 text-2xl sm:text-3xl opacity-35">💗</div>
        <div class="absolute bottom-14 left-20 text-3xl sm:text-4xl opacity-35">❤️</div>
        <div class="absolute bottom-10 right-10 text-2xl sm:text-3xl opacity-30">💖</div>
    </div>

    <div id="login-screen" class="relative z-20 w-full max-w-2xl text-center p-6 sm:p-8 lg:p-12">
        <p class="mb-3 text-sm uppercase tracking-[0.35em] text-rose-400">Pour Margaux</p>
        <h1 class="title text-4xl sm:text-5xl lg:text-7xl xl:text-8xl leading-tight text-rose-600 mb-4 sm:mb-6">Bonjour mon amour...</h1>
        <p class="text-lg sm:text-xl lg:text-2xl text-rose-700 mb-6 sm:mb-8 lg:mb-10">Quel est ton identifiant ?</p>
        
        <input type="text" id="name-input" 
               class="block mx-auto text-center text-base sm:text-xl lg:text-2xl py-4 sm:py-5 lg:py-6 px-4 sm:px-6 lg:px-8 rounded-full border-4 border-rose-300 focus:border-rose-500 outline-none w-full max-w-xs sm:max-w-sm lg:max-w-md shadow-sm"
               placeholder="Ton identifiant...">
        
        <button onclick="checkName()" 
                class="mt-6 sm:mt-8 px-8 sm:px-10 lg:px-12 py-4 sm:py-5 lg:py-6 bg-rose-600 text-white text-lg sm:text-xl rounded-full hover:bg-rose-700 transition w-full max-w-xs sm:max-w-sm shadow-lg shadow-rose-200">
            Se connecter
        </button>
        
        <p id="error-msg" class="text-red-500 mt-5 sm:mt-6 text-base sm:text-lg hidden">Identifiant incorrect...</p>
    </div>

    <div id="main-content" class="hidden relative z-20 w-full max-w-5xl text-center p-6 sm:p-8 lg:p-10">
        <h1 class="title text-5xl sm:text-6xl lg:text-8xl xl:text-[5rem] leading-tight text-rose-600 mb-4 sm:mb-6">Joyeux Anniversaire</h1>
        <h2 class="text-3xl sm:text-4xl lg:text-6xl font-bold text-rose-700">Margaux</h2>
        <p class="mt-6 sm:mt-8 text-lg sm:text-2xl lg:text-3xl text-rose-800">Mon amour, ma vie, mon tout ❤️</p>
        
        <div class="mt-8 sm:mt-10 lg:mt-12 grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5 lg:gap-6">
            <a href="souvenirs.html" class="px-8 sm:px-10 lg:px-12 py-4 sm:py-5 lg:py-6 bg-rose-600 text-white rounded-full text-lg sm:text-xl hover:bg-rose-700 transition shadow-lg shadow-rose-200">Nos Souvenirs</a>
            <a href="poeme.html" class="px-8 sm:px-10 lg:px-12 py-4 sm:py-5 lg:py-6 bg-white text-rose-600 rounded-full text-lg sm:text-xl hover:bg-rose-100 transition shadow-md">Lire mon Poème</a>
            <a href="raisons.html" class="px-8 sm:px-10 lg:px-12 py-4 sm:py-5 lg:py-6 bg-white text-rose-600 rounded-full text-lg sm:text-xl hover:bg-rose-100 transition shadow-md">Pourquoi je t’aime</a>
            <a href="lettre.html" class="px-8 sm:px-10 lg:px-12 py-4 sm:py-5 lg:py-6 bg-white text-rose-600 rounded-full text-lg sm:text-xl hover:bg-rose-100 transition shadow-md">Ma Lettre d’Amour</a>
        </div>
    </div>

    <div id="hearts" class="absolute inset-0 pointer-events-none"></div>

    <script>
        function checkIfLoggedIn() {
            if (sessionStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                startHearts();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('name-input').focus();
            }
        }

        function checkName() {
            const input = document.getElementById('name-input').value.trim();
            const errorMsg = document.getElementById('error-msg');
            
            if (input.toLowerCase() === "margaux") {
                sessionStorage.setItem('isLoggedIn', 'true');
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                startHearts();
            } else {
                errorMsg.classList.remove('hidden');
                alert("Identifiant incorrect.");
                setTimeout(() => errorMsg.classList.add('hidden'), 2500);
            }
        }

        function startHearts() {
            function createHeart() {
                const h = document.createElement('div');
                h.style.position = 'fixed';
                h.style.left = Math.random() * 100 + 'vw';
                h.style.bottom = '-60px';
                h.style.fontSize = (Math.random() * 28 + 24) + 'px';
                h.style.zIndex = '0';
                h.style.opacity = '0.85';
                h.textContent = ['💕','❤️','💗','💖','💘'][Math.floor(Math.random()*5)];
                
                document.getElementById('hearts').appendChild(h);

                setTimeout(() => {
                    h.style.transition = 'all 11s linear';
                    h.style.transform = `translateY(-${window.innerHeight + 200}px) rotate(${Math.random() * 800 - 400}deg)`;
                    h.style.opacity = '0';
                }, 100);

                setTimeout(() => h.remove(), 13000);
            }

            setInterval(createHeart, 280);
            for(let i = 0; i < 20; i++) setTimeout(createHeart, i * 90);
        }

        document.getElementById('name-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') checkName();
        });

        window.onload = () => {
            history.replaceState({ fromIndex: true }, '', '');
            checkIfLoggedIn();
        };

        window.addEventListener('popstate', event => {
            // Lorsque l'utilisateur revient à index.html depuis une autre page du site,
            // on conserve l'état de connexion déjà validé par sessionStorage.
            if (event.state && event.state.fromIndex) {
                checkIfLoggedIn();
            }
        });
    </script>
</body>
</html>
